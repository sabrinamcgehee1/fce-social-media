<style>
    * {
        font-family: "Josefin Sans", sans-serif;
        box-sizing: border-box;
    }
    header {
        display: flex;
        grid-template-columns: 100px auto;
        padding: 5px 0 5px 10px;
        justify-content: space-around;
        align-items: center;
        border-bottom: solid 1px #ddd;
        column-gap: 8px;
        color: #3D405B;
    }
    header img {
        display: block;
        width: 100px;
        height: auto;
        padding-bottom: 3px;
    }

    header span {
        font-size: 4rem;
        color: #3D405B;
        text-align: center;
    }

    /* ******** LIST ******** */
    div {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 80%;
        gap: 7px;
        margin: 0 auto;
    }

    input {
        width: 100%;
        list-style: none;
        text-align: center;
        padding: 25px;
        border: solid 1px #A1A1A1;
        background-color: #D1D1D1;
        box-shadow: 1px 2px #888888;
    }

    input:hover {
        color: #872657;
        background-color: #C1C1C1;
        transition: background-color 0.5s ease-in-out, color 0.5s ease-in-out;
        cursor: pointer;
    }

    @media only screen and (min-width: 38rem) {
        /* ******** HEADER ******** */

        /* Add max width to not take up full screen */
        header, main, footer {
            max-width: 900px;
            margin: 0 auto;
            margin-bottom: 10px;
        }
    }
</style>
<body>
